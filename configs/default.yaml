# Zotigo Default Configuration

# LLM Providers Configuration
providers:
  openai:
    api_key_ref: "env:OPENAI_API_KEY"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4"
    temperature: 0.7
    max_tokens: 4096
    timeout: "30s"
    
  claude:
    api_key_ref: "env:ANTHROPIC_API_KEY"
    base_url: "https://api.anthropic.com"
    model: "claude-3-sonnet-20240229"
    temperature: 0.7
    max_tokens: 4096
    timeout: "30s"
    
  gemini:
    api_key_ref: "env:GEMINI_API_KEY"
    base_url: "https://generativelanguage.googleapis.com"
    model: "gemini-pro"
    temperature: 0.7
    max_tokens: 4096
    timeout: "30s"

# Default provider to use
default_provider: "openai"

# Agent Configuration
agent:
  mode: "chat"  # chat, swe, auto
  max_iterations: 10
  max_execution_time: "5m"
  auto_save_session: true
  
  # ReAct loop configuration
  react:
    max_thinking_time: "30s"
    max_planning_steps: 20
    enable_parallel_execution: true
    retry_on_failure: true
    max_retries: 3

# Security Configuration
security:
  sandbox_enabled: true
  sandbox_timeout: "60s"
  allowed_tools:
    - "filesystem"
    - "git"
    - "web"
    - "code_analysis"
    - "test_runner"
  
  # File system restrictions
  allowed_paths:
    - "."
    - "/tmp"
  
  blocked_paths:
    - "/etc"
    - "/usr"
    - "/bin"
    - "/sbin"
    - "/var"
  
  # Network restrictions
  allowed_domains:
    - "github.com"
    - "stackoverflow.com"
    - "docs.python.org"
  
  # Command execution restrictions
  allowed_commands:
    - "git"
    - "npm"
    - "pip"
    - "go"
    - "python"
    - "node"
  
  blocked_commands:
    - "rm"
    - "sudo"
    - "curl"
    - "wget"

# UI Configuration
ui:
  theme: "dark"  # dark, light, auto
  progress_style: "bar"  # bar, spinner, dots
  streaming: true
  show_thinking: true
  show_metadata: false
  colors:
    primary: "#00D4AA"
    secondary: "#6B7280"
    success: "#10B981"
    warning: "#F59E0B"
    error: "#EF4444"
    info: "#3B82F6"

# Session Management
session:
  auto_save: true
  save_interval: "30s"
  max_history: 100
  compression_enabled: true
  storage_path: "~/.zotigo/sessions"
  
  # Session cleanup
  cleanup_enabled: true
  max_age: "30d"
  max_size: "100MB"

# Logging Configuration
logging:
  level: "info"  # debug, info, warn, error
  format: "json"  # json, text
  output: "file"  # file, stdout, stderr
  file_path: "~/.zotigo/logs/zotigo.log"
  max_size: "10MB"
  max_age: "7d"
  max_backups: 5
  
  # Component-specific logging
  components:
    agent: "info"
    providers: "info"
    tools: "info"
    mcp: "debug"
    protocol: "warn"

# Tool Configuration
tools:
  # Built-in tools configuration
  builtin:
    filesystem:
      enabled: true
      max_file_size: "10MB"
      allowed_extensions:
        - ".txt"
        - ".md"
        - ".json"
        - ".yaml"
        - ".yml"
        - ".py"
        - ".js"
        - ".ts"
        - ".go"
        - ".rs"
        - ".java"
        - ".cpp"
        - ".c"
        - ".h"
    
    git:
      enabled: true
      auto_commit: false
      default_branch: "main"
      max_diff_size: "1MB"
    
    web:
      enabled: true
      max_page_size: "5MB"
      timeout: "10s"
      user_agent: "Zotigo/1.0"
    
    code_analysis:
      enabled: true
      languages:
        - "python"
        - "javascript"
        - "typescript"
        - "go"
        - "rust"
        - "java"
    
    test_runner:
      enabled: true
      timeout: "5m"
      parallel: true

# MCP Configuration
mcp:
  enabled: true
  timeout: "30s"
  max_connections: 10
  
  # MCP servers
  servers: []
    # Example MCP server configuration:
    # - name: "filesystem"
    #   command: ["npx", "@modelcontextprotocol/server-filesystem"]
    #   args: ["/path/to/workspace"]
    #   env:
    #     NODE_ENV: "production"
    #   timeout: "30s"
    #   restart_on_failure: true

# Performance Configuration
performance:
  # Concurrency limits
  max_concurrent_requests: 5
  max_concurrent_tools: 3
  
  # Caching
  cache_enabled: true
  cache_size: "100MB"
  cache_ttl: "1h"
  
  # Rate limiting
  rate_limit:
    requests_per_minute: 60
    tokens_per_minute: 10000
  
  # Memory limits
  max_memory_usage: "1GB"
  
  # Timeouts
  default_timeout: "30s"
  long_operation_timeout: "5m"

# Development Configuration (only used in dev mode)
development:
  debug_mode: false
  profile_enabled: false
  mock_providers: false
  test_mode: false
  
  # Hot reload
  hot_reload: false
  watch_paths:
    - "./core"
    - "./cli"
    - "./configs"

# Telemetry and Analytics
telemetry:
  enabled: false  # User must explicitly opt-in
  endpoint: ""
  api_key_ref: ""
  
  # What to collect (if enabled)
  collect:
    usage_stats: true
    error_reports: true
    performance_metrics: true
    feature_usage: true
  
  # Privacy settings
  anonymize_data: true
  exclude_sensitive_data: true