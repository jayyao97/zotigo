# Zotigo Development Configuration
# This configuration extends default.yaml for development environment

# Override providers for development
providers:
  openai:
    model: "gpt-3.5-turbo"  # Use cheaper model for development
    temperature: 0.1
  
  claude:
    model: "claude-3-haiku-20240307"  # Use faster model for development
  
  gemini:
    model: "gemini-pro"

# Development-focused agent settings
agent:
  mode: "chat"
  max_iterations: 5  # Shorter iterations for faster feedback
  max_execution_time: "2m"
  auto_save_session: false  # Don't clutter with dev sessions
  
  react:
    max_thinking_time: "10s"
    max_planning_steps: 10
    enable_parallel_execution: false  # Easier debugging
    retry_on_failure: false
    max_retries: 1

# Relaxed security for development
security:
  sandbox_enabled: false  # Disable sandbox for easier development
  allowed_tools:
    - "filesystem"
    - "git"
    - "web"
    - "code_analysis"
    - "test_runner"
    - "shell"  # Allow shell access in development
  
  allowed_paths:
    - "."
    - "/tmp"
    - "/Users"  # Allow broader access in development
  
  blocked_paths: []  # Don't block paths in development
  
  allowed_domains: []  # Allow all domains
  
  allowed_commands:
    - "*"  # Allow all commands in development
  
  blocked_commands: []

# Development UI settings
ui:
  theme: "dark"
  progress_style: "dots"
  streaming: true
  show_thinking: true
  show_metadata: true  # Show metadata for debugging

# Development session settings
session:
  auto_save: false
  save_interval: "60s"
  max_history: 50
  compression_enabled: false
  storage_path: "./tmp/sessions"
  
  cleanup_enabled: false  # Keep sessions for debugging

# Enhanced logging for development
logging:
  level: "debug"
  format: "text"  # Easier to read during development
  output: "stdout"
  
  components:
    agent: "debug"
    providers: "debug"
    tools: "debug"
    mcp: "debug"
    protocol: "debug"

# Development tool settings
tools:
  builtin:
    filesystem:
      enabled: true
      max_file_size: "50MB"  # Larger files for development
      allowed_extensions:
        - "*"  # Allow all file types
    
    git:
      enabled: true
      auto_commit: false
      default_branch: "dev"
    
    web:
      enabled: true
      max_page_size: "10MB"
      timeout: "30s"
    
    shell:  # Enable shell tool for development
      enabled: true
      timeout: "60s"
      allowed_commands: ["*"]

# MCP development settings
mcp:
  enabled: true
  timeout: "60s"
  max_connections: 5
  
  # Example development MCP servers
  servers:
    - name: "dev_filesystem"
      command: ["npx", "@modelcontextprotocol/server-filesystem"]
      args: ["."]
      env:
        NODE_ENV: "development"
      timeout: "30s"
      restart_on_failure: true

# Relaxed performance limits for development
performance:
  max_concurrent_requests: 10
  max_concurrent_tools: 10
  
  cache_enabled: false  # Disable cache for fresh results
  
  rate_limit:
    requests_per_minute: 1000
    tokens_per_minute: 100000
  
  max_memory_usage: "2GB"
  
  default_timeout: "60s"
  long_operation_timeout: "10m"

# Development-specific settings
development:
  debug_mode: true
  profile_enabled: true
  mock_providers: false
  test_mode: false
  
  hot_reload: true
  watch_paths:
    - "./core"
    - "./cli"
    - "./configs"
    - "./pkg"

# Disable telemetry in development
telemetry:
  enabled: false