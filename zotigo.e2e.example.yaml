# Zotigo E2E Test Configuration
#
# Copy this file to zotigo.e2e.yaml and fill in your API keys.
# Uses the same profiles format as ~/.zotigo/config.yaml
#
# Run e2e tests: go test -tags=e2e ./tests/e2e/...

default_profile: gpt-4o

profiles:
  gpt-4o:
    provider: openai
    model: gpt-4o
    api_key: "your-openai-api-key"
    base_url: "https://api.openai.com/v1"
    safety:
      classifier:
        enabled: true
        mode: high_risk_and_ambiguous
        profile: gpt-5.4-reasoning
        timeout_ms: 3000
        allow_auto_execute_on_allow: false
        max_recent_actions: 6
        capture_raw_audit_context: false
        max_audit_context_chars: 1200

  claude-sonnet:
    provider: anthropic
    model: claude-sonnet-4-20250514
    api_key: "your-anthropic-api-key"
    base_url: "https://api.anthropic.com"

  gemini-flash:
    provider: gemini
    model: gemini-2.5-flash
    api_key: "your-gemini-api-key"

  # Thinking/reasoning profiles
  claude-sonnet-thinking:
    provider: anthropic
    model: claude-sonnet-4-20250514
    api_key: "your-anthropic-api-key"
    base_url: "https://api.anthropic.com"
    thinking_level: medium
  gemini-pro-thinking:
    provider: gemini
    model: gemini-3-pro-preview
    api_key: "your-gemini-api-key"
    thinking_level: low
  gpt-5.4-reasoning:
    provider: openai
    model: gpt-5.4
    api_key: "your-openai-api-key"
    base_url: "https://api.openai.com/v1"
    thinking_level: medium
