version: "2"

linters:
  exclusions:
    rules:
      # Tests routinely call cleanup helpers (Close, Remove, MkdirAll, Chdir)
      # whose errors are not actionable inside a test body. Standard Go
      # convention is to leave errcheck off for test files; surfacing them
      # adds noise without catching real bugs.
      - path: _test\.go
        linters:
          - errcheck
